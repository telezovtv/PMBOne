<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>PMB Admin Dashboard</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a;
    color: #fff;
    margin: 0;
}

.hero {
    position: relative;
    min-height: 100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding: 30px 0;
    overflow:hidden;
    background: linear-gradient(135deg,#0a0a0a,#1a1a2e);
}

.hero-grid {
    position:absolute;
    width:100%;
    height:100%;
    background-image:
    linear-gradient(rgba(0,242,254,0.03) 1px, transparent 1px),
    linear-gradient(90deg,rgba(0,242,254,0.03) 1px, transparent 1px);
    background-size:50px 50px;
    z-index:0;
}

.dashboard {
    position: relative;
    z-index:1;
    width: 95%;
    max-width: 900px;
    padding: 20px;
    border-radius: 18px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.15);
}

/* ADMIN LAYOUT */
.admin-wrap {
    display: flex;
    gap: 14px;
    margin-top: 20px;
    height: 500px;
}

.admin-list {
    width: 40%;
    overflow-y: auto;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 10px;
}

.admin-editor {
    width: 60%;
    background: rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 12px;
}

.box-item {
    padding: 8px;
    margin: 6px 0;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    cursor: pointer;
    font-size: 12px;
}

.box-item:hover {
    background: rgba(0,242,254,0.15);
}

input, textarea {
    width: 100%;
    margin: 5px 0;
    padding: 7px;
    border-radius: 6px;
    border: none;
    font-size: 12px;
}

button {

    padding: 8px 12px;
    margin: 6px 0;

    border-radius: 14px;
    border: none;

    background: rgba(255, 255, 255, 0.08);
    color: #fff;

    font-size: 12px;
    font-weight: 500;

    backdrop-filter: blur(12px);

    transition: all 0.2s ease;

    cursor: pointer;
}
	button:hover {
    background: rgba(0, 242, 254, 0.15);
    transform: scale(1.02);
}

button:active {
    transform: scale(0.97);
    background: rgba(0, 242, 254, 0.25);
}
	.ios-group {
    background: rgba(255,255,255,0.04);
    padding: 12px;
    border-radius: 18px;

    border: 1px solid rgba(255,255,255,0.08);
}
	.ios-group button {
    border-radius: 12px;
}
</style>
</head>

<body>

<div class="hero">
<div class="hero-grid"></div>

<div class="dashboard">

<p id="adminInfo">PMB ADMIN DASHBOARD Loading...</p>
<!-- ADMIN PANEL -->
<div class="admin-wrap">

    <div class="admin-list">
        <p>PMB's Click to edit</p>
    <!-- 🔎 SEARCH BOX -->
    <input
        id="pmbSearch"
        placeholder="Search PMB (e.g. PMB140)"
        oninput="filterPMBs()"
        style="width:80%; padding:6px; margin-bottom:8px; border-radius:8px; border:none;"
    />		
        <div id="listContainer"></div>
    </div>

    <div class="admin-editor">
        <p id="selectedBox">No selection</p>

        <input id="e_name" placeholder="Customer name">
        <input id="e_email" placeholder="Email">
        <input id="e_phone" placeholder="Phone">
        <input id="e_status" placeholder="Status">
        <textarea id="e_notes" placeholder="Notes"></textarea>

        <button onclick="saveMailbox()">Save</button>
        <button onclick="extendPlan(1)">+1 Month</button>
        <button onclick="extendPlan(3)">+3 Months</button>
		<button onclick="extendPlan(6)">+6 Months</button>

<button onclick="markMail()">📬Mail Received</button>
<button onclick="markPackage()">📦Package</button>
<button onclick="clearNotifications()">🧹Clear</button>
        <button onclick="resetMailbox()">FREE</button>
		<hr style="opacity:0.2;margin:10px 0">

<textarea id="adminMessage"></textarea>
		<hr>
<div id="clientMessageBox">
No PMB messages
</div>

<button onclick="markClientMessageRead()">
✓ Mark Read
</button>
<button onclick="sendMailNotice()">📬Notice</button>
<button onclick="sendEmail()">📧Email</button>
<button onclick="sendSMS()">📱SMS</button>
<button onclick="updatePassword()">🔑 Password</button>	

        <p>💰 Crypto / Stripe Control</p>

        <button onclick="cryptoPaid()">💰 Mark Crypto Paid</button>
        <button onclick="cryptoPending()">⏳ Crypto Pending</button>
        <button onclick="stripePaid()">💳 Stripe Paid</button>
        <button onclick="attachTX()">🔗 Add TXID</button>		
		</div>

</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* =====================
   SUPABASE INIT (ONLY ONCE)
===================== */
const supabaseUrl = "https://kogawaehnkegmtnyiwzu.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtvZ2F3YWVobmtlZ210bnlpd3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NjIyNDUsImV4cCI6MjA5NjIzODI0NX0.TZkcaatq1FVeRPvhWUqE2td4iwTFVHxjktpsL6MhK8E";

const sb = supabase.createClient(supabaseUrl, supabaseKey);
window.sb = sb;

/* =====================
   AUTH CHECK
===================== */
const admin = JSON.parse(localStorage.getItem("pmb_admin"));

if (!admin) {
    document.body.innerHTML = "<h2 style='color:white;text-align:center'>NOT AUTHORIZED</h2>";
    throw new Error("No admin session");
}

/* =====================
   STATE
===================== */
let selectedMailbox = null;
let allMailboxes = [];

/* =====================
   LOAD LIST
===================== */
async function loadMailboxes() {

    const { data, error } = await sb
        .from("mailboxes")
        .select("*")
        .order("pmb_number", { ascending: true });

    if (error) {
        console.error("LOAD ERROR:", error);
        return;
    }

    allMailboxes = data || [];
    renderList(allMailboxes);
}
	function filterPMBs() {

    const input = document.getElementById("pmbSearch");
    if (!input) return;

    const q = input.value.toUpperCase();

    const filtered = allMailboxes.filter(b =>
        (b.pmb_number || "").includes(q)
    );

    renderList(filtered);
}
	function renderList(data) {

    const container = document.getElementById("listContainer");
    if (!container) return;

    container.innerHTML = "";

    data.forEach(box => {

        const div = document.createElement("div");
        div.className = "box-item";

        const expiry = box.paid_until
            ? `📅 ${box.paid_until}`
            : "📅 —";

        div.innerHTML = `
            <b>${box.pmb_number}</b>
            <span style="margin-left:6px">
                ${box.mail_waiting ? "📬" : ""}
                ${box.package_waiting ? "📦" : ""}
                ${box.client_message_read === false ? " 📨" : ""}
            </span><br>

            ${box.customer_name || "FREE"}<br>
            <small>${box.account_status}</small><br>
            <small style="opacity:0.7">${expiry}</small>
        `;

        div.onclick = () => selectMailbox(box);

        container.appendChild(div);
    });
}
	/* =====================
   LIST
===================== */
function renderList(data) {
    const c = document.getElementById("listContainer");
    c.innerHTML = "";

    data.forEach(b => {
        const div = document.createElement("div");
        div.className = "box-item";

        div.innerHTML = `
            <b>${b.pmb_number}</b>
            ${b.crypto_status === "PAID" ? "💰" : ""}
            ${b.stripe_status === "PAID" ? "💳" : ""}
            <br>
            ${b.customer_name || "FREE"}
        `;

        div.onclick = () => selectMailbox(b);
        c.appendChild(div);
    });
}

async function cryptoPaid() {
    await sb.from("mailboxes")
    .update({
        crypto_status:"PAID",
        crypto_confirmed_at:new Date().toISOString()
    })
    .eq("id", selectedMailbox.id);

    loadMailboxes();
}

async function cryptoPending() {
    await sb.from("mailboxes")
    .update({ crypto_status:"PENDING" })
    .eq("id", selectedMailbox.id);

    loadMailboxes();
}

async function stripePaid() {
    await sb.from("mailboxes")
    .update({
        stripe_status:"PAID",
        stripe_confirmed_at:new Date().toISOString()
    })
    .eq("id", selectedMailbox.id);

    loadMailboxes();
}	
	async function attachTX() {
    const tx = prompt("TX ID:");
    if (!tx) return;

    await sb.from("mailboxes")
    .update({ crypto_txid: tx })
    .eq("id", selectedMailbox.id);

    loadMailboxes();
}
/* =====================
   SELECT BOX
===================== */
function selectMailbox(box) {

    // 🔥 IMPORTANT: re-sync from MASTER array
    const fresh = allMailboxes.find(b => b.id === box.id);

    selectedMailbox = fresh || box;

    document.getElementById("selectedBox").innerText = selectedMailbox.pmb_number;

    document.getElementById("e_name").value = selectedMailbox.customer_name || "";
    document.getElementById("e_email").value = selectedMailbox.customer_email || "";
    document.getElementById("e_phone").value = selectedMailbox.customer_phone || "";
    document.getElementById("e_status").value = selectedMailbox.account_status || "";
    document.getElementById("e_notes").value = selectedMailbox.admin_notes || "";

    document.getElementById("clientMessageBox").innerText =
        selectedMailbox.client_message || "No messages";

    console.log("SELECTED:", selectedMailbox.pmb_number, selectedMailbox.paid_until);
}
	
	async function updatePassword() {

    if (!selectedMailbox) {
        alert("Select a mailbox first");
        return;
    }

    const newPass = prompt(
        `New password for ${selectedMailbox.pmb_number}:`,
        ""
    );

    if (newPass === null) return;

    const password = newPass.trim();

    if (password === "") {
        alert("Password cannot be empty");
        return;
    }

    const { error } = await sb
        .from("mailboxes")
        .update({
            login_password: password
        })
        .eq("id", selectedMailbox.id);

    if (error) {
        alert("Password update failed");
        console.error(error);
        return;
    }

    alert(`Password updated for ${selectedMailbox.pmb_number}`);

    loadMailboxes();
}
/* =====================
   SAVE
===================== */
async function saveMailbox() {

    if (!selectedMailbox) return;

    const { error } = await window.sb
        .from("mailboxes")
        .update({
            customer_name: document.getElementById("e_name").value,
            customer_email: document.getElementById("e_email").value,
            customer_phone: document.getElementById("e_phone").value,
            account_status: document.getElementById("e_status").value,
            admin_notes: document.getElementById("e_notes").value
        })
        .eq("id", selectedMailbox.id);

    if (error) {
        alert("Update failed");
        return;
    }

    alert("Saved");
    loadMailboxes();
}

/* =====================
   EXTEND
===================== */
async function extendPlan(months) {

    if (!selectedMailbox) return;

    const base = selectedMailbox.paid_until
        ? new Date(selectedMailbox.paid_until)
        : new Date();

    base.setMonth(base.getMonth() + months);

    const { error } = await window.sb
        .from("mailboxes")
        .update({
            paid_until: base.toISOString().split("T")[0]
        })
        .eq("id", selectedMailbox.id);

    if (error) {
        alert("Extend failed");
        return;
    }

    loadMailboxes();
}
	/* =====================
   SENDING
===================== */	
function requireSelected() {
    if (!selectedMailbox) {
        alert("Select a mailbox first");
        return null;
    }
    return selectedMailbox;
}

function sendEmail() {

    const box = requireSelected();
    if (!box) return;

    const message = document.getElementById("adminMessage").value || "";

    if (!box.customer_email) return alert("No email saved");

    const subject = `PMB ${box.pmb_number} - Message from Admin`;

    const body = `
Hello ${box.customer_name || "Customer"},

${message}

---
PMB Admin System
`;

    const mailto = `mailto:${box.customer_email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

    window.open(mailto, "_blank");
}

function sendSMS() {

    const box = requireSelected();
    if (!box) return;

    const message = document.getElementById("adminMessage").value || "";

    if (!box.customer_phone) return alert("No phone number saved");

    window.location.href =
        `sms:${box.customer_phone}?body=${encodeURIComponent(message)}`;
}
async function sendMailNotice() {

    if (!selectedMailbox) return;

    const msg = document.getElementById("adminMessage").value;

    if (!msg) return alert("Write a message");

    const { error } = await sb
        .from("mailboxes")
        .update({
            mail_waiting: true,
            admin_notes: msg
        })
        .eq("id", selectedMailbox.id);

    if (error) return alert(error.message);

    loadMailboxes();
}

async function markMail() {

    if (!selectedMailbox) return;

    await window.sb
        .from("mailboxes")
        .update({ mail_waiting: true })
        .eq("id", selectedMailbox.id);

    loadMailboxes();
}

async function markPackage() {

    if (!selectedMailbox) return;

    await window.sb
        .from("mailboxes")
        .update({ package_waiting: true })
        .eq("id", selectedMailbox.id);

    loadMailboxes();
}

async function clearNotifications() {

    if (!selectedMailbox) return;

    await window.sb
        .from("mailboxes")
        .update({
            mail_waiting: false,
            package_waiting: false
        })
        .eq("id", selectedMailbox.id);

    loadMailboxes();
}

async function resetMailbox() {

    if (!selectedMailbox) return;

    const { error } = await window.sb
        .from("mailboxes")
        .update({
            customer_name: null,
            customer_email: null,
            customer_phone: null,
            occupancy: "FREE",
            account_status: "AVAILABLE",
            paid_until: null,
            admin_notes: "RESET BY ADMIN",
            mail_waiting: false,
            package_waiting: false
        })
        .eq("id", selectedMailbox.id);

    if (error) return alert("Reset failed");

    loadMailboxes();
}

/* =====================
   INIT
===================== */
document.addEventListener("DOMContentLoaded", () => {
    loadMailboxes();
});
</script>

</body>
</html>
