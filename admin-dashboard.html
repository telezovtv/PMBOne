<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>PMB Admin Dashboard V2</title>

<style>
/* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a;
    color: #fff;
    margin: 0;
}

.hero {
    position: relative;
    min-height: 100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding: 30px 0;
    overflow:hidden;
    background: linear-gradient(135deg,#0a0a0a,#1a1a2e);
}

.hero-grid {
    position:absolute;
    width:100%;
    height:100%;
    background-image:
    linear-gradient(rgba(0,242,254,0.03) 1px, transparent 1px),
    linear-gradient(90deg,rgba(0,242,254,0.03) 1px, transparent 1px);
    background-size:50px 50px;
    z-index:0;
}

.dashboard {
    position: relative;
    z-index:1;
    width: 95%;
    max-width: 900px;
    padding: 20px;
    border-radius: 18px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.15);
}

.admin-wrap {
    display: flex;
    gap: 14px;
    margin-top: 20px;
    height: 500px;
}

.admin-list {
    width: 40%;
    overflow-y: auto;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 10px;
}

.admin-editor {
    width: 60%;
    background: rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 12px;
}

.box-item {
    padding: 8px;
    margin: 6px 0;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    cursor: pointer;
    font-size: 12px;
}

.box-item:hover {
    background: rgba(0,242,254,0.15);
}

input, textarea {
    width: 100%;
    margin: 5px 0;
    padding: 7px;
    border-radius: 6px;
    border: none;
    font-size: 12px;
}

button {
    padding: 8px 12px;
    margin: 6px 0;
    border-radius: 14px;
    border: none;
    background: rgba(255, 255, 255, 0.08);
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    backdrop-filter: blur(12px);
    transition: all 0.2s ease;
    cursor: pointer;
}

button:hover {
    background: rgba(0, 242, 254, 0.15);
    transform: scale(1.02);
}

button:active {
    transform: scale(0.97);
    background: rgba(0, 242, 254, 0.25);
}
</style>
</head>

<body>

<div class="hero">
<div class="hero-grid"></div>

<div class="dashboard">

<p id="adminInfo">PMB ADMIN DASHBOARD V2 LOADING...</p>

<div class="admin-wrap">

    <div class="admin-list">
        <p>PMB's Click to edit</p>	
		  <!-- 🔎 SEARCH BOX -->
    <input
        id="pmbSearch"
        placeholder="Search PMB (e.g. PMB140)"
        oninput="filterPMBs()"
        style="width:80%; padding:6px; margin-bottom:8px; border-radius:8px; border:none;"
    />
		
		
        <div id="listContainer"></div>
    </div>

    <div class="admin-editor">
        <p id="selectedBox">No selection</p>

        <input id="e_name" placeholder="Customer name">
        <input id="e_email" placeholder="Email">
        <input id="e_phone" placeholder="Phone">
        <input id="e_status" placeholder="Status">
        <textarea id="e_notes" placeholder="Notes"></textarea>

        <button onclick="saveMailbox()">Save</button>

        <button onclick="runAction('EXTEND_1')">+1 Month</button>
        <button onclick="runAction('EXTEND_3')">+3 Months</button>
        <button onclick="runAction('EXTEND_6')">+6 Months</button>

        <button onclick="runAction('MARK_MAIL')">📬 Mail</button>
        <button onclick="runAction('MARK_PACKAGE')">📦 Package</button>
        <button onclick="runAction('CLEAR_FLAGS')">🧹 Clear</button>
        <button onclick="runAction('RESET')">FREE</button>

        <hr>

        <p>💰 Crypto / Stripe Control</p>

        <button onclick="cryptoPaid()">💰 Mark Crypto Paid</button>
        <button onclick="cryptoPending()">⏳ Crypto Pending</button>
        <button onclick="stripePaid()">💳 Stripe Paid</button>
        <button onclick="attachTX()">🔗 Add TXID</button>

        <textarea id="adminMessage"></textarea>

        <p>Customer Message</p>
        <div id="clientMessageBox">No messages</div>
    </div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* =====================
   SUPABASE
===================== */
const sb = supabase.createClient(
    "https://kogawaehnkegmtnyiwzu.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtvZ2F3YWVobmtlZ210bnlpd3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NjIyNDUsImV4cCI6MjA5NjIzODI0NX0.TZkcaatq1FVeRPvhWUqE2td4iwTFVHxjktpsL6MhK8E"
);

/* =====================
   STATE
===================== */
let selectedMailbox = null;
let allMailboxes = [];

/* =====================
   LOAD
===================== */
async function loadMailboxes() {
    const { data } = await sb.from("mailboxes").select("*").order("pmb_number");
    allMailboxes = data || [];
    renderList(allMailboxes);
}

function filterPMBs() {
    const input = document.getElementById("pmbSearch");
    if (!input) return;

    const q = (input.value || "").trim().toUpperCase();

    // ✅ if empty → restore full list
    if (!q) {
        renderList(allMailboxes);
        return;
    }

    const filtered = allMailboxes.filter(b =>
        String(b.pmb_number || "").toUpperCase().includes(q)
    );

    renderList(filtered);
}
/* =====================
   LIST
===================== */
function renderList(data) {
    const c = document.getElementById("listContainer");
    c.innerHTML = "";

    data.forEach(b => {
        const div = document.createElement("div");
        div.className = "box-item";

        div.innerHTML = `
            <b>${b.pmb_number}</b>
            ${b.crypto_status === "PAID" ? "💰" : ""}
            ${b.stripe_status === "PAID" ? "💳" : ""}
            <br>
            ${b.customer_name || "FREE"}
        `;

        div.onclick = () => selectMailbox(b);
        c.appendChild(div);
    });
}

/* =====================
   SELECT
===================== */
function selectMailbox(box) {
    selectedMailbox = box;

    document.getElementById("selectedBox").innerText = box.pmb_number;
    document.getElementById("e_name").value = box.customer_name || "";
    document.getElementById("e_email").value = box.customer_email || "";
    document.getElementById("e_phone").value = box.customer_phone || "";
    document.getElementById("e_status").value = box.account_status || "";
    document.getElementById("e_notes").value = box.admin_notes || "";
}

/* =====================
   SAFE ACTION ENGINE (V2 CORE)
===================== */
function runAction(type) {
    if (!selectedMailbox) return alert("Select mailbox first");

    switch(type) {
        case "EXTEND_1": return extend(1);
        case "EXTEND_3": return extend(3);
        case "EXTEND_6": return extend(6);
        case "MARK_MAIL": return mark("mail_waiting", true);
        case "MARK_PACKAGE": return mark("package_waiting", true);
        case "CLEAR_FLAGS": return clearFlags();
        case "RESET": return resetBox();
    }
}

/* =====================
   EXTEND
===================== */
async function extend(months) {
    const base = selectedMailbox.paid_until ? new Date(selectedMailbox.paid_until) : new Date();
    base.setMonth(base.getMonth() + months);

    await sb.from("mailboxes")
    .update({ paid_until: base.toISOString().split("T")[0] })
    .eq("id", selectedMailbox.id);

    loadMailboxes();
}

/* =====================
   FLAGS
===================== */
async function mark(field, value) {
    await sb.from("mailboxes")
    .update({ [field]: value })
    .eq("id", selectedMailbox.id);

    loadMailboxes();
}

async function clearFlags() {
    await sb.from("mailboxes")
    .update({ mail_waiting:false, package_waiting:false })
    .eq("id", selectedMailbox.id);

    loadMailboxes();
}

/* =====================
   RESET
===================== */
async function resetBox() {
    await sb.from("mailboxes")
    .update({
        customer_name:null,
        customer_email:null,
        customer_phone:null,
        account_status:"FREE",
        crypto_status:null,
        stripe_status:null,
        paid_until:null
    })
    .eq("id", selectedMailbox.id);

    loadMailboxes();
}

/* =====================
   CRYPTO + STRIPE V2
===================== */
async function cryptoPaid() {
    await sb.from("mailboxes")
    .update({
        crypto_status:"PAID",
        crypto_confirmed_at:new Date().toISOString()
    })
    .eq("id", selectedMailbox.id);

    loadMailboxes();
}

async function cryptoPending() {
    await sb.from("mailboxes")
    .update({ crypto_status:"PENDING" })
    .eq("id", selectedMailbox.id);

    loadMailboxes();
}

async function stripePaid() {
    await sb.from("mailboxes")
    .update({
        stripe_status:"PAID",
        stripe_confirmed_at:new Date().toISOString()
    })
    .eq("id", selectedMailbox.id);

    loadMailboxes();
}

async function attachTX() {
    const tx = prompt("TX ID:");
    if (!tx) return;

    await sb.from("mailboxes")
    .update({ crypto_txid: tx })
    .eq("id", selectedMailbox.id);

    loadMailboxes();
}
const msg =
    selectedMailbox?.client_message &&
    selectedMailbox.client_message.trim().length > 0
        ? selectedMailbox.client_message
        : "No Customer messages";

document.getElementById("clientMessageBox").innerText = msg;
/* =====================
   INIT
===================== */
document.addEventListener("DOMContentLoaded", loadMailboxes);
</script>

</body>
</html>
