<!--?xml version="1.0" encoding="UTF-8"?-->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

<defs>

<radialGradient id="core">
    <stop offset="0%" stop-color="#ffffff"></stop>
    <stop offset="18%" stop-color="#9df9ff"></stop>
    <stop offset="55%" stop-color="#00dfff"></stop>
    <stop offset="100%" stop-color="#00dfff" stop-opacity="0"></stop>
</radialGradient>

<filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="2.2" result="b"></feGaussianBlur>
    <feMerge>
        <feMergeNode in="b"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
    </feMerge>
</filter>

</defs>

<!-- transparent -->
<rect width="100" height="100" fill="transparent"></rect>

<!-- fixed radar rings -->

<g stroke="#00e6ff" fill="none" opacity=".35">

<circle cx="50" cy="50" r="18"></circle>
<circle cx="50" cy="50" r="30"></circle>
<circle cx="50" cy="50" r="42"></circle>

</g>

<!-- expanding pulse -->

<circle cx="50" cy="50" r="8" stroke="#00e6ff" stroke-width="1.4" fill="none" filter="url(#glow)">

<animate attributeName="r" values="8;50" dur="2.4s" repeatCount="indefinite"></animate>

<animate attributeName="opacity" values=".8;0" dur="2.4s" repeatCount="indefinite"></animate>

</circle>

<!-- glowing center -->

<circle cx="50" cy="50" r="11" fill="url(#core)" filter="url(#glow)">

<animate attributeName="r" values="10;12;10" dur="1.6s" repeatCount="indefinite"></animate>

</circle>

<!-- cross flare -->

<g stroke="#9ef9ff" opacity=".55" filter="url(#glow)">

<line x1="20" y1="50" x2="80" y2="50"></line>
<line x1="50" y1="20" x2="50" y2="80"></line>

</g>

<!-- rotating radar sweep -->

<g filter="url(#glow)">

<path d="M50 50 L50 10
A40 40 0 0 1 72 16
Z" fill="#00ffff" opacity=".28">

<animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="2s" repeatCount="indefinite"></animateTransform>

</path>

</g>

<!-- scanner line -->

<g filter="url(#glow)">

<line x1="50" y1="50" x2="50" y2="10" stroke="#b8ffff" stroke-width="1.8" stroke-linecap="round">

<animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="2s" repeatCount="indefinite"></animateTransform>

</line>

</g>

<!-- blinking targets -->

<g fill="#9ffcff">

<circle cx="66" cy="24" r="1">
<animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite"></animate>
</circle>

<circle cx="72" cy="66" r="1">
<animate attributeName="opacity" values="0;1;0" dur="2.1s" begin=".6s" repeatCount="indefinite"></animate>
</circle>

<circle cx="28" cy="60" r="1">
<animate attributeName="opacity" values="0;1;0" dur="1.6s" begin=".9s" repeatCount="indefinite"></animate>
</circle>

<circle cx="42" cy="22" r=".8">
<animate attributeName="opacity" values="0;1;0" dur="2s" begin="1.2s" repeatCount="indefinite"></animate>
</circle>

</g>

</svg>